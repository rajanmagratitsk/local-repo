<!DOCTYPE html>
<html>
<body style="text-align:center; margin-top:100px;">

<audio id="song" src="your-song.mp3"></audio>

<button onclick="play()">Play</button>
<button onclick="pause()">Pause</button>

<script>
let audio = document.getElementById("song");

function play(){
    audio.play();
}
function pause(){
    audio.pause();
}
</script>

</body>
</html>
