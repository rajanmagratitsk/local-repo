<!DOCTYPE html>
<html>
<body style="text-align:center;">
<canvas id="game" width="400" height="400" style="border:1px solid black;"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let snake = [{x:200,y:200}], dx=20, dy=0, food = {x:0,y:0};

function randomFood() {
  food.x = Math.floor(Math.random()*20)*20;
  food.y = Math.floor(Math.random()*20)*20;
}
randomFood();

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp") {dx=0;dy=-20;}
  if(e.key==="ArrowDown") {dx=0;dy=20;}
  if(e.key==="ArrowLeft") {dx=-20;dy=0;}
  if(e.key==="ArrowRight") {dx=20;dy=0;}
});

function game() {
  ctx.fillStyle="black"; ctx.fillRect(0,0,400,400);
  ctx.fillStyle="red"; ctx.fillRect(food.x,food.y,20,20);
  let head = {x:snake[0].x+dx, y:snake[0].y+dy};
  snake.unshift(head);
  if(head.x===food.x && head.y===food.y){ randomFood(); } else { snake.pop(); }
  ctx.fillStyle="lime";
  snake.forEach(s=>ctx.fillRect(s.x,s.y,20,20));
  if(snake.slice(1).some(s=>s.x===head.x && s.y===head.y) || head.x<0||head.x>=400||head.y<0||head.y>=400){
    alert("Game Over! Reload to play again."); clearInterval(interval);
  }
}
let interval = setInterval(game, 200);
</script>
</body>
</html>
