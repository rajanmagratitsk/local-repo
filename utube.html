<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rajan Aryan Youtube</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Roboto',Arial,sans-serif;background:#0f0f0f;color:#fff;min-height:100vh}
:root{--yt-red:#ff0000;--yt-bg:#0f0f0f;--yt-surface:#212121;--yt-border:#3f3f3f;--yt-text:#fff;--yt-muted:#aaa;--yt-hover:#272727}
.topbar{position:sticky;top:0;z-index:100;background:#0f0f0f;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px;gap:16px;border-bottom:1px solid #1a1a1a}
.logo{display:flex;align-items:center;gap:4px;text-decoration:none;min-width:100px}
.logo svg{width:92px;height:20px}
.search-bar{display:flex;flex:1;max-width:640px;height:40px}
.search-bar input{flex:1;background:#121212;border:1px solid #3f3f3f;border-right:none;border-radius:40px 0 0 40px;color:#fff;font-size:16px;padding:0 16px;outline:none}
.search-bar input:focus{border-color:#1c62b9}
.search-bar button{background:#272727;border:1px solid #3f3f3f;border-left:none;border-radius:0 40px 40px 0;color:#fff;cursor:pointer;padding:0 20px;font-size:18px}
.search-bar button:hover{background:#3f3f3f}
.top-actions{display:flex;gap:8px;align-items:center}
.icon-btn{background:none;border:none;color:#fff;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.icon-btn:hover{background:#272727}
.avatar{width:32px;height:32px;border-radius:50%;background:#c05f3c;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;cursor:pointer;flex-shrink:0}
.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:240px;flex-shrink:0;padding:12px 0;overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px)}
.sidebar-item{display:flex;align-items:center;gap:24px;padding:0 24px;height:40px;cursor:pointer;border-radius:10px;margin:0 8px;font-size:14px;color:#fff;text-decoration:none}
.sidebar-item:hover{background:#272727}
.sidebar-item.active{background:#272727;font-weight:500}
.sidebar-item .si{font-size:20px;width:24px;text-align:center;flex-shrink:0}
.sidebar-divider{height:1px;background:#3f3f3f;margin:12px 0}
.sidebar-section{padding:12px 24px 4px;font-size:14px;font-weight:500;color:#fff}
.main{flex:1;padding:24px 24px 0;overflow:hidden}
.chips{display:flex;gap:12px;margin-bottom:24px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.chips::-webkit-scrollbar{display:none}
.chip{background:#272727;border:none;color:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:14px;white-space:nowrap;flex-shrink:0}
.chip.active,.chip:hover{background:#fff;color:#0f0f0f}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.video-card{cursor:pointer}
.thumb{position:relative;background:#2a2a2a;border-radius:12px;overflow:hidden;aspect-ratio:16/9}
.thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px}
.duration{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.8);color:#fff;font-size:12px;font-weight:500;padding:2px 4px;border-radius:4px}
.video-info{display:flex;gap:12px;padding:12px 4px 8px}
.ch-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center}
.video-meta h3{font-size:14px;font-weight:500;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.video-meta .ch-name{font-size:13px;color:#aaa;margin-bottom:2px}
.video-meta .stats{font-size:13px;color:#aaa}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <svg viewBox="0 0 90 20" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="2" width="26" height="16" rx="4" fill="#ff0000"/>
      <polygon points="10,6 20,10 10,14" fill="white"/>
      <text x="30" y="15" font-size="14" font-weight="700" fill="white" font-family="Arial">NICHYO</text>
    </svg>
  </div>
  <div class="search-bar">
    <input type="text" placeholder="Search" id="searchInput"/>
    <button>🔍</button>
  </div>
  <div class="top-actions">
    <button class="icon-btn" title="Notifications">🔔</button>
    <div class="avatar">U</div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <a class="sidebar-item active" href="#">
      <span class="si">🏠</span><span>Home</span>
    </a>
    <a class="sidebar-item" href="#">
      <span class="si">📺</span><span>Shorts</span>
    </a>
    <a class="sidebar-item" href="#">
      <span class="si">📑</span><span>Subscriptions</span>
    </a>
    <div class="sidebar-divider"></div>
    <a class="sidebar-item" href="#">
      <span class="si">📂</span><span>You</span>
    </a>
    <a class="sidebar-item" href="#">
      <span class="si">🕐</span><span>History</span>
    </a>
    <a class="sidebar-item" href="#">
      <span class="si">▶️</span><span>Playlists</span>
    </a>
    <a class="sidebar-item" href="#">
      <span class="si">👍</span><span>Liked videos</span>
    </a>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">Subscriptions</div>
    <a class="sidebar-item" href="#">
      <div style="background:#7b2fff;width:24px;height:24px;font-size:11px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:500">MB</div>
      <span>MrBeast</span>
    </a>
    <a class="sidebar-item" href="#">
      <div style="background:#c05f3c;width:24px;height:24px;font-size:11px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:500">T</div>
      <span>TED</span>
    </a>
    <a class="sidebar-item" href="#">
      <div style="background:#1c6eb4;width:24px;height:24px;font-size:11px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:500">VS</div>
      <span>Veritasium</span>
    </a>
    <a class="sidebar-item" href="#">
      <div style="background:#1d7a4a;width:24px;height:24px;font-size:11px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:500">KH</div>
      <span>Khan Academy</span>
    </a>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">Explore</div>
    <a class="sidebar-item" href="#"><span class="si">🔥</span><span>Trending</span></a>
    <a class="sidebar-item" href="#"><span class="si">🎵</span><span>Music</span></a>
    <a class="sidebar-item" href="#"><span class="si">🎮</span><span>Gaming</span></a>
    <a class="sidebar-item" href="#"><span class="si">📰</span><span>News</span></a>
    <a class="sidebar-item" href="#"><span class="si">⚽</span><span>Sports</span></a>
    <div class="sidebar-divider"></div>
    <a class="sidebar-item" href="#"><span class="si">⚙️</span><span>Settings</span></a>
    <a class="sidebar-item" href="#"><span class="si">🚩</span><span>Report history</span></a>
    <a class="sidebar-item" href="#"><span class="si">❓</span><span>Help</span></a>
  </div>

  <div class="main">
    <div class="chips" id="chips">
      <button class="chip active" onclick="filterChip(this,'All')">All</button>
      <button class="chip" onclick="filterChip(this,'Mixes')">Mixes</button>
      <button class="chip" onclick="filterChip(this,'Music')">Music</button>
      <button class="chip" onclick="filterChip(this,'Gaming')">Gaming</button>
      <button class="chip" onclick="filterChip(this,'Technology')">Technology</button>
      <button class="chip" onclick="filterChip(this,'Science')">Science</button>
      <button class="chip" onclick="filterChip(this,'Comedy')">Comedy</button>
      <button class="chip" onclick="filterChip(this,'News')">News</button>
      <button class="chip" onclick="filterChip(this,'Sports')">Sports</button>
      <button class="chip" onclick="filterChip(this,'Cooking')">Cooking</button>
      <button class="chip" onclick="filterChip(this,'Travel')">Travel</button>
    </div>
    <div class="video-grid" id="videoGrid"></div>
  </div>
</div>

<script>
const videos=[
  {thumb:'🌍',color:'#1a3a5c',duration:'12:43',title:'How the Earth Was Made - Full Documentary',channel:'Discovery Channel',chColor:'#e87820',chInit:'D',views:'4.2M views',ago:'2 years ago',cat:'Science'},
  {thumb:'🎮',color:'#1a2a1a',duration:'24:11',title:"I Spent 100 Days in Minecraft Hardcore and Here's What Happened",channel:'MrBeast',chColor:'#7b2fff',chInit:'MB',views:'68M views',ago:'1 year ago',cat:'Gaming'},
  {thumb:'🤖',color:'#0d1b2a',duration:'18:22',title:'The AI Revolution: What Comes Next for Humanity',channel:'Veritasium',chColor:'#1c6eb4',chInit:'V',views:'11.3M views',ago:'5 months ago',cat:'Technology'},
  {thumb:'🎸',color:'#2a1a0d',duration:'3:48',title:'Bohemian Rhapsody - Official Music Video Remastered',channel:'Queen Official',chColor:'#8b0000',chInit:'Q',views:'1.5B views',ago:'3 years ago',cat:'Music'},
  {thumb:'😂',color:'#2a2a0d',duration:'10:05',title:'Best Stand-Up Comedy Moments of the Year 2024',channel:'Netflix Comedy',chColor:'#e50914',chInit:'N',views:'23M views',ago:'8 months ago',cat:'Comedy'},
  {thumb:'🍕',color:'#2a1515',duration:'15:30',title:'Gordon Ramsay Makes Perfect Homemade Pizza From Scratch',channel:'Gordon Ramsay',chColor:'#c0392b',chInit:'GR',views:'33M views',ago:'2 years ago',cat:'Cooking'},
  {thumb:'🚀',color:'#0a0a2a',duration:'31:07',title:'SpaceX Starship Flight Test - Full Replay & Analysis',channel:'SpaceX',chColor:'#1a1a1a',chInit:'SX',views:'8.9M views',ago:'4 months ago',cat:'Technology'},
  {thumb:'⚽',color:'#0d2a0d',duration:'5:14',title:'Top 50 Greatest Goals in Football History',channel:'FIFA',chColor:'#1d6eb4',chInit:'F',views:'55M views',ago:'1 year ago',cat:'Sports'},
  {thumb:'🗺️',color:'#1a2a1a',duration:'22:19',title:'Solo Travel in Japan 2024 - Everything You Need to Know',channel:'Lost LeBlanc',chColor:'#e87820',chInit:'LL',views:'2.8M views',ago:'6 months ago',cat:'Travel'},
  {thumb:'📰',color:'#1a1a2a',duration:'8:42',title:"Breaking: What's Happening in 2025 So Far",channel:'CNN',chColor:'#c0392b',chInit:'CN',views:'5.1M views',ago:'1 week ago',cat:'News'},
  {thumb:'🎵',color:'#2a0d1a',duration:'3:22',title:'Billie Eilish - BIRDS OF A FEATHER (Official Video)',channel:'Billie Eilish',chColor:'#2ecc71',chInit:'BE',views:'900M views',ago:'9 months ago',cat:'Music'},
  {thumb:'🧠',color:'#1a0d2a',duration:'20:00',title:'How to Learn Anything 10x Faster with This Method',channel:'Khan Academy',chColor:'#1d7a4a',chInit:'KH',views:'9.4M views',ago:'11 months ago',cat:'Science'},
];

let activeChip='All';
let searchTerm='';

function filterChip(el,cat){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  activeChip=cat;
  render();
}

document.getElementById('searchInput').addEventListener('input',e=>{
  searchTerm=e.target.value.toLowerCase();
  render();
});

function render(){
  const grid=document.getElementById('videoGrid');
  let list=videos;
  if(activeChip!=='All') list=list.filter(v=>v.cat===activeChip);
  if(searchTerm) list=list.filter(v=>v.title.toLowerCase().includes(searchTerm)||v.channel.toLowerCase().includes(searchTerm));
  if(list.length===0){
    grid.innerHTML='<div style="color:#aaa;font-size:15px;grid-column:1/-1;padding:40px 0">No videos found.</div>';
    return;
  }
  grid.innerHTML=list.map(v=>`
    <div class="video-card">
      <div class="thumb" style="background:${v.color}">
        <div class="thumb-placeholder">${v.thumb}</div>
        <span class="duration">${v.duration}</span>
      </div>
      <div class="video-info">
        <div class="ch-avatar" style="background:${v.chColor}">${v.chInit}</div>
        <div class="video-meta">
          <h3>${v.title}</h3>
          <div class="ch-name">${v.channel}</div>
          <div class="stats">${v.views} · ${v.ago}</div>
        </div>
      </div>
    </div>
  `).join('');
}

render();
</script>
</body>
</html>
