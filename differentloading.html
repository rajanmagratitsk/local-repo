<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading Screens</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f4f6f9;
      font-family: Arial, sans-serif;
      gap: 40px;
    }

    /* Spinner Loader */
    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #16a085;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Bouncing Dots Loader */
    .dots {
      display: flex;
      gap: 8px;
    }
    .dots div {
      width: 12px;
      height: 12px;
      background: #3498db;
      border-radius: 50%;
      animation: bounce 0.6s infinite alternate;
    }
    .dots div:nth-child(2) { animation-delay: 0.2s; }
    .dots div:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      to { transform: translateY(-15px); }
    }

    /* Progress Bar Loader */
    .progress {
      width: 200px;
      height: 10px;
      background: #ddd;
      border-radius: 5px;
      overflow: hidden;
    }
    .progress div {
      height: 100%;
      width: 0;
      background: #e67e22;
      animation: load 3s infinite;
    }
    @keyframes load {
      0% { width: 0; }
      50% { width: 100%; }
      100% { width: 0; }
    }

    /* Pulse Loader */
    .pulse {
      width: 20px;
      height: 20px;
      background: #9b59b6;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Spinner Loader -->
  <div class="spinner"></div>
  <p>Spinner Loader</p>

  <!-- Bouncing Dots Loader -->
  <div class="dots">
    <div></div><div></div><div></div>
  </div>
  <p>Bouncing Dots Loader</p>

  <!-- Progress Bar Loader -->
  <div class="progress">
    <div></div>
  </div>
  <p>Progress Bar Loader</p>

  <!-- Pulse Loader -->
  <div class="pulse"></div>
  <p>Pulse Loader</p>

</body>
</html>
