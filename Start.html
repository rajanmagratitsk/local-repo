<!DOCTYPE html>
<html>
<head>
    <title>Lists and Tables Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
        }

        h2 {
            color: #34495e;
        }

        /* Styling for lists */
        ul {
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            width: 300px;
        }

        li {
            margin: 5px 0;
        }

        /* Styling for tables */
        table {
            width: 60%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #2980b9;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #2980b9;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #d6eaf8;
        }

        tr:hover {
            background-color: #aed6f1;
        }
    </style>
</head>
<body>
    <h1>My Learning Page</h1>

    <!-- Unordered List -->
    <h2>My Favorite Fruits</h2>
    <ul>
        <li>Mango</li>
        <li>Banana</li>
        <li>Apple</li>
        <li>Grapes</li>
    </ul>

    <!-- Ordered List -->
    <h2>Steps to Make Tea</h2>
    <ol>
        <li>Boil water</li>
        <li>Add tea leaves</li>
        <li>Pour milk and sugar</li>
        <li>Stir and serve</li>
    </ol>

    <!-- Table Example -->
    <h2>Student Scores</h2>
    <table>
        <tr>
            <th>Student Name</th>
            <th>Subject</th>
            <th>Score</th>
        </tr>
        <tr>
            <td>Rajan</td>
            <td>Math</td>
            <td>95</td>
        </tr>
        <tr>
            <td>Sita</td>
            <td>Science</td>
            <td>88</td>
        </tr>
        <tr>
            <td>Hari</td>
            <td>English</td>
            <td>92</td>
        </tr>
    </table>
</body>
</html>
