<!DOCTYPE html>
<html>
<head>
    <title>Factorial Number</title>
</head>
<body>

<h2>Find Factorial</h2>

<label>Enter Number:</label>
<input type="number" id="num">
<button onclick="fact()">Show</button>

<p id="result"></p>

<script>
function fact() {
    let n = document.getElementById("num").value;
    let f = 1;

    for(let i=1; i<=n; i++) {
        f = f * i;
    }

    document.getElementById("result").innerHTML = "Factorial = " + f;
}
</script>

</body>
</html>
