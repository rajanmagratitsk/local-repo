<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special ❤️</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        font-family: 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #ff4e50, #1a1a2e);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    .container {
        text-align: center;
        z-index: 2;
    }

    h1 {
        font-size: 3em;
        margin-bottom: 10px;
        text-shadow: 0 0 20px pink;
    }

    p {
        font-size: 1.4em;
        opacity: 0.9;
        min-height: 40px;
    }

    button {
        margin-top: 20px;
        padding: 12px 25px;
        border: none;
        border-radius: 30px;
        background: pink;
        color: black;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: white;
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
    }
</style>
</head>

<body>

<canvas id="hearts"></canvas>

<div class="container">
    <h1>Hey ❤️</h1>
    <p id="text"></p>
    <button onclick="showLove()">Click Me 💌</button>
</div>

<script>
const messages = [
    "From the moment I met you...",
    "My world became more beautiful 🌸",
    "Your smile makes everything better 😊",
    "I may not be perfect...",
    "But my love for you is real ❤️",
    "I love you so much 💖"
];

let i = 0;
let j = 0;
let currentText = "";
let isDeleting = false;

function typeEffect() {
    const textElement = document.getElementById("text");

    if (i < messages.length) {
        if (!isDeleting && j <= messages[i].length) {
            currentText = messages[i].substring(0, j++);
        } else if (isDeleting && j >= 0) {
            currentText = messages[i].substring(0, j--);
        }

        textElement.innerHTML = currentText;

        if (j === messages[i].length) isDeleting = true;
        if (j === 0 && isDeleting) {
            isDeleting = false;
            i++;
        }
    }

    setTimeout(typeEffect, 80);
}

typeEffect();

function showLove() {
    alert("You are my favorite person ❤️");
}

/* Floating Hearts Animation */
const canvas = document.getElementById("hearts");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];

class Heart {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + 20;
        this.size = Math.random() * 15 + 10;
        this.speed = Math.random() * 1 + 0.5;
        this.opacity = Math.random();
    }

    update() {
        this.y -= this.speed;
    }

    draw() {
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = "pink";
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.bezierCurveTo(this.x - this.size, this.y - this.size,
                          this.x - this.size*2, this.y + this.size/3,
                          this.x, this.y + this.size*2);
        ctx.bezierCurveTo(this.x + this.size*2, this.y + this.size/3,
                          this.x + this.size, this.y - this.size,
                          this.x, this.y);
        ctx.fill();
    }
}

function animateHearts() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (hearts.length < 50) {
        hearts.push(new Heart());
    }

    hearts.forEach((heart, index) => {
        heart.update();
        heart.draw();

        if (heart.y < -20) {
            hearts.splice(index, 1);
        }
    });

    requestAnimationFrame(animateHearts);
}

animateHearts();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
