<!DOCTYPE html>
<html>
<head>
    <title>3x3 Grid Learning</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 {
            margin-top: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: #4CAF50;
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .box:hover {
            background-color: #2e7d32;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>3 × 3 Grid Example</h1>
    <p>Each box contains a letter (A to I)</p>

    <div class="grid">
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
        <div class="box">D</div>
        <div class="box">E</div>
        <div class="box">F</div>
        <div class="box">G</div>
        <div class="box">H</div>
        <div class="box">I</div>
    </div>

</body>
</html>
