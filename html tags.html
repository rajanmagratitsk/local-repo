<!DOCTYPE html>
<html>
<head>
    <title>Rowspan, Colspan, Padding, Margin Example</title>
    <style>
        table {
            border-collapse: collapse;
            width: 70%;
            margin: 20px auto; /* margin outside the table */
        }
        th, td {
            border: 2px solid black;
            padding: 15px; /* padding inside each cell */
            text-align: center;
        }
        .box {
            border: 2px solid blue;
            padding: 20px;   /* space inside the box */
            margin: 30px;    /* space outside the box */
            background-color: #f0f8ff;
        }
    </style>
</head>
<body>
    <h1 style="text-align:center;">Rowspan, Colspan, Padding & Margin Demo</h1>

    <!-- Table with rowspan and colspan -->
    <table>
        <tr>
            <th colspan="3">Student Information</th>
        </tr>
        <tr>
            <td rowspan="2">Name</td>
            <td>Class</td>
            <td>Section</td>
        </tr>
        <tr>
            <td>10</td>
            <td>A</td>
        </tr>
        <tr>
            <td>Rajan</td>
            <td>12</td>
            <td>B</td>
        </tr>
    </table>

    <!-- Box showing padding and margin -->
    <div class="box">
        <p>This is a box with <strong>padding</strong> (space inside the border) 
        and <strong>margin</strong> (space outside the border).</p>
    </div>
</body>
</html>
