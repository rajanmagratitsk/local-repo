<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
button {
    padding: 15px 40px;
    font-size: 20px;
    color: #fff;
    background: transparent;
    border: 2px solid #0ff;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 0 10px #0ff, 0 0 40px #0ff;
    transition: 0.3s;
}
button:hover {
    box-shadow: 0 0 20px #0ff, 0 0 80px #0ff;
}
</style>
</head>
<body>
<button>Click Me</button>
</body>
</html>
