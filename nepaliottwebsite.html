<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NepFlix | नेपाली OTT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f1f 100%);
            min-height: 100vh;
            padding: 1rem;
        }

        /* header */
        .header {
            max-width: 1200px;
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 0.5rem 0;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo span {
            font-size: 1rem;
            background: none;
            color: #ff8e53;
        }

        .filter-buttons {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: #ccc;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .filter-btn.active {
            background: #ff6b4a;
            color: white;
            box-shadow: 0 4px 12px rgba(255,107,74,0.3);
        }

        /* grid */
        .movie-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.2rem;
        }

        .card {
            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.2rem;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border-color: rgba(255,107,74,0.4);
        }

        .poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: linear-gradient(145deg, #1a1a2e, #111122);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff6b4a;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            color: white;
        }

        .movie-info {
            padding: 0.9rem;
        }

        .title {
            font-weight: 700;
            color: white;
            font-size: 1rem;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meta {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-size: 0.75rem;
        }

        .year {
            color: #ffaa80;
        }

        /* modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .modal-content {
            max-width: 450px;
            width: 100%;
            background: #14142a;
            border-radius: 1.8rem;
            overflow: hidden;
            animation: modalPop 0.2s ease;
            border: 1px solid rgba(255,107,74,0.5);
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-poster {
            height: 220px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 1rem;
            background: linear-gradient(0deg, #000000aa, transparent);
        }

        .modal-poster span {
            font-size: 3rem;
            background: rgba(0,0,0,0.5);
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }

        .modal-info {
            padding: 1.5rem;
        }

        .modal-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
        }

        .modal-detail {
            color: #ffaa80;
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .modal-desc {
            color: #bbb;
            font-size: 0.9rem;
            line-height: 1.4;
            margin: 1rem 0;
        }

        .watch-btn {
            background: linear-gradient(95deg, #ff6b4a, #ff8c5a);
            border: none;
            width: 100%;
            padding: 0.9rem;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 550px) {
            .movie-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 0.8rem;
            }
            .modal-content { max-width: 95%; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🎬 नेपFLIX <span>| नेपाली सिनेमा</span></div>
    <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">सबै</button>
        <button class="filter-btn" data-filter="movie">चलचित्र</button>
        <button class="filter-btn" data-filter="series">सिरिज</button>
    </div>
</div>

<div class="movie-grid" id="movieGrid"></div>

<!-- modal -->
<div id="modal" class="modal">
    <div class="close-modal" id="closeModalBtn">✕</div>
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
    // नेपाली movies & series data
    const contentData = [
        { id: 1, title: "जारी", type: "movie", year: "2023", rating: "4.8", posterEmoji: "🎭", desc: "नेपाली बक्स अफिसमा ऐतिहासिक सफलता, प्रेम, बलिदान र संघर्षको कथा।", genre: "ड्रामा" },
        { id: 2, title: "कबड्डी कबड्डी", type: "movie", year: "2015", rating: "4.6", posterEmoji: "🏐", desc: "हाँस्य र रोमान्सले भरिपूर्ण, गाउँले प्रेमकथा।" },
        { id: 3, title: "प्रेम गीत", type: "movie", year: "2016", rating: "4.7", posterEmoji: "🎵", desc: "सांगीतिक प्रेमकथा, पहाडी संस्कृति र मधुर गीतहरू।" },
        { id: 4, title: "छक्का पञ्जा", type: "movie", year: "2016", rating: "4.5", posterEmoji: "😂", desc: "कमेडी र पारिवारिक मनोरञ्जनको उत्कृष्ट उदाहरण।" },
        { id: 5, title: "पशुपति प्रसाद", type: "movie", year: "2016", rating: "4.9", posterEmoji: "🍻", desc: "दारी भएको मान्छेको जीवनशैली र सामाजिक ब्यंग्य।" },
        { id: 6, title: "नाइ नभन्नु ल २", type: "series", year: "2023", rating: "4.7", posterEmoji: "📺", desc: "लोकप्रिय सिटकम, पारिवारिक हाँस्य शृंखला। एपिसोड २४+" },
        { id: 7, title: "साकुम्बा", type: "series", year: "2024", rating: "4.5", posterEmoji: "🏔️", desc: "नेपाली मौलिकता र रहस्यमय कथा भएको वेब सिरिज।" },
        { id: 8, title: "विराटको सपना", type: "series", year: "2024", rating: "4.3", posterEmoji: "⚽", desc: "खेलकुद र युवा सपनाको प्रेरणादायी शृंखला।" },
        { id: 9, title: "होस्टेल", type: "series", year: "2023", rating: "4.6", posterEmoji: "🏠", desc: "छात्रावासको जीवन, मित्रता र रोमान्स।" },
        { id: 10, title: "लुट २", type: "movie", year: "2017", rating: "4.8", posterEmoji: "💰", desc: "ब्ल्याक कमेडी, चोरीको अनौठो योजना।" },
        { id: 11, title: "आमा", type: "movie", year: "2022", rating: "4.4", posterEmoji: "👩‍👧", desc: "आमाको माया र त्यागको मार्मिक कथा।" },
        { id: 12, title: "दुर्लभ", type: "series", year: "2024", rating: "4.2", posterEmoji: "🔍", desc: "रहस्यमय थ्रिलर वेब सिरिज, हरेक एपिसोडमा ट्विस्ट।" }
    ];

    let currentFilter = "all";
    let selectedItem = null;

    const movieGrid = document.getElementById("movieGrid");
    const modal = document.getElementById("modal");
    const modalContentDiv = document.getElementById("modalContent");

    function renderCards() {
        const filtered = currentFilter === "all" ? contentData : contentData.filter(item => item.type === currentFilter);
        if (filtered.length === 0) {
            movieGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem; color:#aaa;">❌ कुनै सामग्री भेटिएन</div>`;
            return;
        }
        movieGrid.innerHTML = filtered.map(item => `
            <div class="card" onclick="openModal(${item.id})">
                <div class="poster">
                    ${item.posterEmoji}
                    <span class="badge">${item.type === "movie" ? "🎬 फिल्म" : "📺 सिरिज"}</span>
                </div>
                <div class="movie-info">
                    <div class="title">${item.title}</div>
                    <div class="meta">
                        <span class="year">${item.year}</span>
                        <span>⭐ ${item.rating}</span>
                    </div>
                </div>
            </div>
        `).join("");
    }

    window.openModal = (id) => {
        selectedItem = contentData.find(i => i.id === id);
        if (!selectedItem) return;
        const typeLabel = selectedItem.type === "movie" ? "चलचित्र" : "वेब सिरिज";
        const watchText = selectedItem.type === "movie" ? "▶ अब हेर्नुहोस्" : "⏯ एपिसोड १ हेर्नुहोस्";
        modalContentDiv.innerHTML = `
            <div class="modal-poster" style="background: linear-gradient(0deg, #0a0a1a, #1f1f3a), url('');">
                <span style="font-size:4rem;">${selectedItem.posterEmoji}</span>
            </div>
            <div class="modal-info">
                <div class="modal-title">${selectedItem.title}</div>
                <div class="modal-detail">
                    <span>📅 ${selectedItem.year}</span>
                    <span>⭐ ${selectedItem.rating}/5</span>
                    <span>🎭 ${typeLabel}</span>
                    <span>🎬 ${selectedItem.genre || "नेपाली"}</span>
                </div>
                <div class="modal-desc">${selectedItem.desc}</div>
                <button class="watch-btn" onclick="watchNow(${selectedItem.id})">${watchText}</button>
            </div>
        `;
        modal.style.display = "flex";
    };

    window.watchNow = (id) => {
        const item = contentData.find(i => i.id === id);
        alert(`🎉 "${item.title}" हेर्नको लागि तपाईंलाई NepFlix मा स्वागत छ !\n(स्ट्रिमिङ सुरु हुँदैछ) 🍿`);
        modal.style.display = "none";
    };

    function closeModalFunc() {
        modal.style.display = "none";
    }

    // filter buttons event
    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.getAttribute("data-filter");
            renderCards();
        });
    });

    modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModalFunc();
    });
    document.getElementById("closeModalBtn").addEventListener("click", closeModalFunc);

    // init
    renderCards();
</script>
</body>
</html>
