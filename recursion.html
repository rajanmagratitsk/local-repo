<!DOCTYPE html>
<html>
<head>
    <title>Recursion Example</title>
</head>
<body>

<h2>Factorial Using Recursion</h2>

<script>
function factorial(n)
{
    if(n==0 || n==1)
    {
        return 1;
    }
    else
    {
        return n * factorial(n-1);
    }
}

let num = 5;
document.write("Factorial of " + num + " is = " + factorial(num));
</script>

</body>
</html>
