<!DOCTYPE html>
<html>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#111;">
<div style="width:100px;height:100px;border:10px solid #0ff;border-top:10px solid transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
<style>
@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
</style>
</body>
</html>
