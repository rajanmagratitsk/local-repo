<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  background: linear-gradient(to top, #0a0a0a, #1a1a2e);
  overflow: hidden;
}

/* Sun Light */
.sun {
  position: absolute;
  top: 50px;
  right: 100px;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, #fff176, #ff9800);
  border-radius: 50%;
  box-shadow: 0 0 60px 20px rgba(255,200,0,0.6);
  animation: glow 3s infinite alternate;
}
@keyframes glow {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* Ground */
.ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 150px;
  background: #1b5e20;
}

/* Stem */
.stem {
  position: absolute;
  bottom: 150px;
  left: 50%;
  width: 6px;
  height: 0;
  background: #4caf50;
  transform: translateX(-50%);
  animation: growStem 4s forwards;
}
@keyframes growStem {
  to { height: 200px; }
}

/* Leaves */
.leaf {
  position: absolute;
  width: 40px;
  height: 20px;
  background: #66bb6a;
  border-radius: 20px 0;
  opacity: 0;
}
.leaf.left {
  left: -40px;
  transform: rotate(-30deg);
  animation: leafGrow 2s 2s forwards;
}
.leaf.right {
  right: -40px;
  transform: rotate(30deg);
  animation: leafGrow 2s 2.5s forwards;
}
@keyframes leafGrow {
  to { opacity: 1; }
}

/* Flower */
.flower {
  position: absolute;
  top: -40px;
  left: 50%;
  transform: translateX(-50%) scale(0);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle, #ff4081, #e91e63);
  box-shadow: 0 0 20px #ff4081;
  animation: bloom 2s 4s forwards;
}
@keyframes bloom {
  to { transform: translateX(-50%) scale(1); }
}

/* Petals */
.petal {
  position: absolute;
  width: 40px;
  height: 40px;
  background: pink;
  border-radius: 50%;
  top: 20px;
  left: 20px;
  transform-origin: center;
}

/* Light effect */
.light {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 80% 20%, rgba(255,255,200,0.2), transparent 60%);
  pointer-events: none;
}
</style>
</head>

<body>

<div class="sun"></div>
<div class="light"></div>

<div class="ground"></div>

<div class="stem" id="stem">
  <div class="leaf left"></div>
  <div class="leaf right"></div>
  <div class="flower" id="flower"></div>
</div>

<script>
// Create petals dynamically
let flower = document.getElementById("flower");

for(let i=0;i<8;i++){
  let petal = document.createElement("div");
  petal.className = "petal";
  petal.style.transform = `rotate(${i*45}deg) translate(30px)`;
  flower.appendChild(petal);
}
</script>

</body>
</html>
