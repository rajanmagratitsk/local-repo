<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Web Tech MCQ Quiz</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #0f172a;
        color: white;
    }

    /* HEADER */
    .header {
        position: relative;
        background: linear-gradient(135deg, #22c55e, #06b6d4);
        padding: 60px;
        text-align: center;
    }

    .header h1 {
        margin: 0;
        font-size: 38px;
    }

    svg {
        position: absolute;
        bottom: 0;
        left: 0;
    }

    /* QUIZ BOX */
    .container {
        padding: 40px;
        max-width: 800px;
        margin: auto;
    }

    .question-box {
        background: #1e293b;
        padding: 20px;
        margin-bottom: 25px;
        border-radius: 12px;
        transition: 0.3s;
    }

    .question-box:hover {
        transform: scale(1.02);
    }

    .question {
        font-size: 18px;
        margin-bottom: 15px;
    }

    .options label {
        display: block;
        background: #334155;
        padding: 10px;
        margin: 8px 0;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
    }

    .options input {
        margin-right: 10px;
    }

    .options label:hover {
        background: #22c55e;
    }

    /* BUTTON */
    button {
        padding: 12px 25px;
        border: none;
        background: #22c55e;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #16a34a;
    }

    /* RESULT */
    #result {
        margin-top: 20px;
        font-size: 20px;
    }
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>Web Technology MCQ Quiz</h1>

    <svg viewBox="0 0 1440 320">
        <path fill="#0f172a"
        d="M0,224L80,192C160,160,320,96,480,96C640,96,800,160,960,170.7C1120,181,1280,139,1360,117.3L1440,96V320H0Z">
        </path>
    </svg>
</div>

<!-- QUIZ -->
<div class="container">

    <!-- Q1 -->
    <div class="question-box">
        <div class="question">1. What does HTML stand for?</div>
        <div class="options">
            <label><input type="radio" name="q1" value="0"> Hyper Trainer Marking Language</label>
            <label><input type="radio" name="q1" value="1"> Hyper Text Markup Language</label>
            <label><input type="radio" name="q1" value="0"> Hyper Text Marketing Language</label>
        </div>
    </div>

    <!-- Q2 -->
    <div class="question-box">
        <div class="question">2. Which tag is used for inserting image?</div>
        <div class="options">
            <label><input type="radio" name="q2" value="1"> &lt;img&gt;</label>
            <label><input type="radio" name="q2" value="0"> &lt;image&gt;</label>
            <label><input type="radio" name="q2" value="0"> &lt;src&gt;</label>
        </div>
    </div>

    <!-- Q3 -->
    <div class="question-box">
        <div class="question">3. Which language is used for styling web pages?</div>
        <div class="options">
            <label><input type="radio" name="q3" value="0"> HTML</label>
            <label><input type="radio" name="q3" value="1"> CSS</label>
            <label><input type="radio" name="q3" value="0"> Python</label>
        </div>
    </div>

    <!-- BUTTON -->
    <button onclick="checkScore()">Submit</button>

    <!-- RESULT -->
    <div id="result"></div>

</div>

<script>
function checkScore() {
    let score = 0;

    let answers = document.querySelectorAll('input[type="radio"]:checked');

    answers.forEach(ans => {
        score += Number(ans.value);
    });

    document.getElementById("result").innerHTML =
        "Your Score: " + score + " / 3";
}
</script>

</body>
</html>
