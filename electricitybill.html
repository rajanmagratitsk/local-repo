<!DOCTYPE html>
<html>
<head>
    <title>Electric Bill Calculator</title>
    <style>
        body{
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background: linear-gradient(to right, #dff9fb, #c7ecee);
        }
        .box{
            background: white;
            width: 350px;
            margin: auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 0px 10px gray;
        }
        input{
            padding: 8px;
            width: 180px;
            margin: 8px;
        }
        button{
            padding: 10px 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
        }
        h2{
            color: #130f40;
        }
        #result{
            margin-top: 20px;
            font-size: 22px;
            color: #eb4d4b;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
<h2>Electric Bill Calculator</h2>

Enter Units Used:<br>
<input type="number" id="unit"><br>

<button onclick="bill()">Calculate Bill</button>

<div id="result"></div>
</div>

<script>
function bill()
{
    let u = document.getElementById("unit").value;
    let total = 0;

    if(u <= 100)
    {
        total = u * 5;
    }
    else if(u <= 200)
    {
        total = (100 * 5) + ((u - 100) * 7);
    }
    else
    {
        total = (100 * 5) + (100 * 7) + ((u - 200) * 10);
    }

    document.getElementById("result").innerHTML =
    "Total Bill = Rs. " + total;
}
</script>

</body>
</html>
