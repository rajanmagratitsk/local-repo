<!DOCTYPE html>
<html>
<body style="background:black;color:#0f0;font-family:monospace;padding:20px;">

<h2>Enter Password:</h2>
<input type="password" id="pass">
<button onclick="scan()">Scan</button>

<div id="output"></div>

<script>
function scan(){
  let out = document.getElementById("output");
  out.innerHTML = "";

  let msgs = [
    "Scanning database...",
    "Bypassing firewall...",
    "Decrypting password...",
    "Access granted ✔"
  ];

  let i=0;
  function next(){
    if(i<msgs.length){
      out.innerHTML += msgs[i]+"<br>";
      i++;
      setTimeout(next,1000);
    }
  }
  next();
}
</script>

</body>
</html>
