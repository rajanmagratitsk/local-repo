<!DOCTYPE html>
<html>
<head>
    <title>Rowspan and Colspan Tutorial</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 30px;
        }
        table {
            border-collapse: collapse;
            margin: auto;
            width: 60%;
        }
        th, td {
            border: 2px solid black;
            padding: 15px;
            text-align: center;
        }
        h2 {
            color: darkblue;
        }
        .note {
            margin-top: 20px;
            font-size: 18px;
            color: darkgreen;
        }
    </style>
</head>
<body>

<h2>Learn Rowspan and Colspan</h2>

<table>
    <tr>
        <th colspan="3">Colspan Example (This heading covers 3 columns)</th>
    </tr>
    <tr>
        <td>HTML</td>
        <td>CSS</td>
        <td>JavaScript</td>
    </tr>

    <tr>
        <th rowspan="2">Rowspan Example</th>
        <td>Row 1 Data</td>
        <td>Extra</td>
    </tr>
    <tr>
        <td>Row 2 Data</td>
        <td>Extra</td>
    </tr>
</table>

<div class="note">
    <p><b>colspan</b> = Merge columns horizontally</p>
    <p><b>rowspan</b> = Merge rows vertically</p>
</div>

</body>
</html>
