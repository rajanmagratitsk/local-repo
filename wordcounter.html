<!DOCTYPE html>
<html>
<head>
<title>Word Counter</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #1e1e2f, #2c2c54);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: #111;
  padding: 30px;
  border-radius: 15px;
  width: 400px;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  border: none;
  padding: 10px;
  resize: none;
  font-size: 16px;
}

.stats {
  margin-top: 15px;
  display: flex;
  justify-content: space-between;
}

.stat {
  text-align: center;
}

.stat h3 {
  margin: 5px 0;
  color: cyan;
}
</style>
</head>

<body>

<div class="container">
  <h2>📝 Word Counter</h2>
  
  <textarea id="text" placeholder="Start typing here..."></textarea>

  <div class="stats">
    <div class="stat">
      <p>Words</p>
      <h3 id="words">0</h3>
    </div>
    <div class="stat">
      <p>Characters</p>
      <h3 id="chars">0</h3>
    </div>
    <div class="stat">
      <p>Sentences</p>
      <h3 id="sentences">0</h3>
    </div>
  </div>
</div>

<script>
let text = document.getElementById("text");

text.addEventListener("input", () => {
  let value = text.value;

  // Word count
  let words = value.trim().split(/\s+/).filter(w => w.length > 0);

  // Character count
  let chars = value.length;

  // Sentence count
  let sentences = value.split(/[.!?]+/).filter(s => s.trim().length > 0);

  document.getElementById("words").innerText = words.length;
  document.getElementById("chars").innerText = chars;
  document.getElementById("sentences").innerText = sentences.length;
});
</script>

</body>
</html>
